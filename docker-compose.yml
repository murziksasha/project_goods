services:
  mongo:
    image: mongo:7
    container_name: project_goods_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: project_goods_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/inventory
      CLIENT_ORIGIN: http://localhost:5173,http://192.168.10.55:5173
      BACKUP_DIR: /app/backups
    ports:
      - "5000:5000"
    volumes:
      - backup-data:/app/backups

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://192.168.10.55:5000/api
    container_name: project_goods_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mongo-data:
  backup-data:
